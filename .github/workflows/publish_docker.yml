name: Publish Lava Package and Container

on:
  workflow_dispatch:
    inputs:
      bump_type:
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
        description: "Select the type of version bump for the release"
  #push:
  #  branches:
  #    - master

jobs:
  get_version:
    name: "Generate new release version"
    runs-on: ubuntu-latest
    outputs:
      v-version: ${{ steps.version.outputs.v-version }}
    steps:
      - name: Get next version
        uses: reecetech/version-increment@2024.10.1
        id: version
        with:
          release_branch: master
          use_api: true
          increment: ${{ github.event.inputs.bump_type || 'patch' }}

  build_release_assets:
    name: "Create LAVA Debian Package and Wheel file"
    needs: [get_version]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-22.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout LAVA at current commit
        uses: actions/checkout@v6

      - name: Install compile dependencies
        run: |
          version=$(lsb_release -rs)
          dep_base=./dependencies/ubuntu_${version}_base.txt
          sudo apt-get -qq update
          if [ -f "${dep_base}" ]; then
            sudo apt-get -y install --no-install-recommends $(cat ${dep_base} | grep -o '^[^#]*')
          else
            echo "Unsupported Ubuntu version: $version. Create a list of base/build dependencies and try again."
            exit 1
          fi

      - name: Create Debian Package
        run: |
          cmake -B"./tools/build" \
          -H"./tools" \
          -DCMAKE_INSTALL_PREFIX="/usr" \
          -DCMAKE_BUILD_TYPE=Release \
          -DLAVA_VERSION=${{ needs.create_release.outputs.v-version }}
          cmake --build "./tools/build" --parallel "$(nproc)" --config Release
          cd ./tools/build
          cpack -G DEB

      - name: Create Wheel file
        run: |
          python3 -m pip install --upgrade build
          PRETEND_VERSION=${{ needs.create_release.outputs.v-version }} python3 -m build --wheel .

      - name: Upload deb packages as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lava
          path: tools/build/lava*.deb
          if-no-files-found: error

      - name: Upload whl package as artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyroclastic
          path: dist/*.whl
          if-no-files-found: error

  publish-to-pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    if: github.repository == 'panda-re/panda' && github.ref == 'refs/heads/dev'
    needs:
      - get_version
      - build_release_assets
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyroclastic
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download whl artifact
        uses: actions/download-artifact@v7
        with:
          name: pyroclastic
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  # Runs on forks too!
  create_github_release:
    name: Create GitHub Release
    needs:
      - get_version
      - build_release_assets
      - publish-to-pypi
      # Override default skip behavior: Run if we are on dev AND the required 
      # build steps succeeded AND PyPI either succeeded (main repo) or was skipped (forks).
    if: |
      always() &&
      needs.get_version.result == 'success' &&
      needs.build_release_assets.result == 'success' &&
      (needs['publish-to-pypi'].result == 'success' || needs['publish-to-pypi'].result == 'skipped') &&
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write  
    steps:
      - name: Download deb artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: lava
          path: debs/
      - name: Download whl artifact
        uses: actions/download-artifact@v7
        with:
          name: pyroclastic
          path: dist/
      - name: Upload packages to release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.get_version.outputs.v-version }}
          draft: false
          generate_release_notes: true
          prerelease: false
          name: ${{ needs.get_version.outputs.v-version }}
          files: |
            dist/*
            debs/**/*.deb

  build_container:
    name: "Deploy new LAVA container to panda-re/lava DockerHub"
    needs: 
      - get_version
      - publish-to-pypi
    if: github.repository == 'panda-re/lava' && github.ref == 'refs/heads/master'
    runs-on: panda-arc
    steps:
    - name: Login to Docker Registry
      uses: docker/login-action@v4
      with:
        username: pandare
        password: ${{ secrets.ALL_PANDARE_DOCKERHUB }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        version: latest
        driver-opts: |
          network=host
        buildkitd-config-inline: |
          [registry."${{ secrets.PANDA_ARC_REGISTRY }}"]
            insecure = true
            http = true

    - name: Check out
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Build LAVA container
      uses: docker/build-push-action@v7
      with:
        context: ${{ github.workspace }}
        push: true
        tags: |
          pandare/lava:latest
          pandare/lava:${{ github.sha }}
          pandare/lava:${{ needs.create_release.outputs.v-version }}
